<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Screenshot Grid</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Live Screenshot Grid</h1>
        <p id="refresh-meta" class="meta">Waiting for screenshots...</p>
      </header>

      <section id="empty-state" class="empty-state hidden">
        <p>No screenshots found in <code>screenshots/</code>.</p>
      </section>

      <section id="grid" class="grid"></section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
