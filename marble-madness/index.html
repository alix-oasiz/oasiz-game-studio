<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Marble Madness</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
        background: radial-gradient(circle at 20% 10%, #243a77 0%, #0c1635 45%, #070d1f 100%);
        color: #edf2ff;
        font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .overlay {
        position: fixed;
        inset: 0;
      }

      .hidden {
        display: none !important;
      }

      .center-overlay {
        display: grid;
        place-items: center;
        padding: 16px;
        background: rgba(8, 14, 32, 0.45);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      .panel {
        width: min(94vw, 560px);
        max-width: 100%;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.37),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
        padding: 24px 20px;
        box-sizing: border-box;
      }

      .title {
        margin: 0 0 10px;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: clamp(2rem, 8.5vw, 3.5rem);
        word-wrap: break-word;
        overflow-wrap: break-word;
      }

      .subtitle {
        margin: 0 0 18px;
        line-height: 1.45;
        color: #dbe6ff;
        font-size: clamp(1rem, 3.7vw, 1.2rem);
      }

      .button {
        border: 0;
        border-radius: 14px;
        padding: 13px 20px;
        background: linear-gradient(180deg, #74bcff, #3a79df);
        color: #ffffff;
        font-weight: 800;
        font-size: 1rem;
        letter-spacing: 0.04em;
        box-shadow:
          0 10px 22px rgba(23, 76, 178, 0.46),
          inset 0 1px 0 rgba(255, 255, 255, 0.32);
        cursor: pointer;
        display: block;
        margin: 0 auto;
      }

      .button:active {
        transform: translateY(2px);
      }

      #hud {
        pointer-events: none;
      }

      .hud-chip {
        position: fixed;
        top: 70px;
        left: 18px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
        padding: 9px 14px;
        font-size: 0.93rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      #speed-label {
        top: 116px;
      }

      #level-progress {
        position: fixed;
        top: 46px;
        left: 50%;
        transform: translateX(-50%);
        width: min(38vw, 360px);
        pointer-events: none;
      }

      .level-progress-track {
        position: relative;
        height: 9px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.15),
          0 4px 16px rgba(0, 0, 0, 0.2);
        overflow: visible;
      }

      .level-progress-markers {
        position: absolute;
        inset: 2px 6px;
        pointer-events: none;
      }

      .level-progress-marker {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2px;
        border-radius: 999px;
        background: rgba(176, 207, 255, 0.48);
      }

      .level-progress-marble {
        position: absolute;
        top: 50%;
        left: 0%;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid rgba(188, 225, 255, 0.95);
        background:
          radial-gradient(circle at 35% 30%, #d6f3ff 0%, #7accff 30%, #2f8fe9 62%, #165cbf 100%);
        box-shadow:
          0 0 16px rgba(83, 168, 255, 0.68),
          inset 0 1px 0 rgba(255, 255, 255, 0.62);
      }

      #version-label,
      #fps-label {
        display: none !important;
      }

      .control-btn {
        position: fixed;
        z-index: 6;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        color: #ffffff;
        display: grid;
        place-items: center;
        cursor: pointer;
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
        transition: all 0.2s ease;
      }

      .control-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.25);
      }

      .control-btn svg {
        width: 22px;
        height: 22px;
      }

      #restart-btn {
        top: 70px;
        left: calc(100% - 126px);
      }

      #settings-btn {
        top: 70px;
        right: 18px;
      }

      #mobile-controls {
        display: none !important;
      }

      .settings-modal {
        display: grid;
        place-items: center;
        z-index: 20;
        background: rgba(8, 14, 32, 0.45);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      .settings-card {
        width: min(90vw, 380px);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.37),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
        padding: 28px 24px;
      }

      .settings-title {
        margin: 0 0 24px;
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #ffffff;
        text-align: center;
      }

      .settings-pane {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 18px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.2s ease;
      }

      .setting-row:hover {
        background: rgba(255, 255, 255, 0.09);
        border-color: rgba(255, 255, 255, 0.15);
      }

      .setting-label {
        font-weight: 600;
        font-size: 1.05rem;
        color: #ffffff;
        letter-spacing: 0.01em;
      }

      /* iOS-style toggle switch */
      .toggle-btn {
        position: relative;
        width: 56px;
        height: 32px;
        border-radius: 16px;
        border: none;
        background: rgba(255, 255, 255, 0.2);
        cursor: pointer;
        transition: all 0.3s ease;
        padding: 0;
        overflow: hidden;
      }

      .toggle-btn::after {
        content: '';
        position: absolute;
        top: 3px;
        left: 3px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .toggle-btn[data-enabled="true"] {
        background: linear-gradient(135deg, #5fb3ff, #3a79df);
      }

      .toggle-btn[data-enabled="true"]::after {
        left: 27px;
        background: #ffffff;
      }

      .modal-actions {
        margin-top: 24px;
        display: flex;
        justify-content: center;
      }

      .modal-actions .button {
        min-width: 140px;
        font-size: 1rem;
      }

      @media (pointer: coarse) {
        #restart-btn,
        #settings-btn {
          top: 120px;
        }

        .hud-chip {
          top: 150px;
          left: 16px;
        }

        #speed-label {
          top: 196px;
        }

        #level-progress {
          top: 120px;
          width: min(34vw, 220px);
          left: 50%;
          transform: translateX(-50%);
        }

        .desktop-only {
          display: none !important;
        }
      }

    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas" aria-label="Marble Madness"></canvas>

      <div id="start-screen" class="overlay center-overlay">
        <div class="panel">
          <h1 class="title">Marble Madness</h1>
          <p class="subtitle">
            Press and drag anywhere to steer. Up pushes the marble forward, and force scales with swipe strength.
          </p>
          <button id="start-btn" class="button">Start Run</button>
        </div>
      </div>

      <div id="hud" class="overlay hidden">
        <div id="time-label" class="hud-chip">Time: 0.00s</div>
        <div id="speed-label" class="hud-chip">Speed: 0.0</div>
        <div id="level-progress">
          <div class="level-progress-track">
            <div id="level-progress-markers" class="level-progress-markers"></div>
            <div id="level-progress-marble" class="level-progress-marble"></div>
          </div>
        </div>
      </div>
      <div id="version-label">Build 0.0.0</div>
      <div id="fps-label">FPS 0</div>

      <button id="restart-btn" class="control-btn hidden" aria-label="Restart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-3-6.7" />
          <path d="M21 3v6h-6" />
        </svg>
      </button>

      <button id="settings-btn" class="control-btn hidden" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 0 1 0 2.8 2 2 0 0 1-2.8 0l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 0 1-2.8 0 2 2 0 0 1 0-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 0 1 0-2.8 2 2 0 0 1 2.8 0l.1.1a1.6 1.6 0 0 0 1.8.3h.1a1.6 1.6 0 0 0 .9-1.5V3a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 1 1.5h.1a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8v.1a1.6 1.6 0 0 0 1.5.9H21a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z" />
        </svg>
      </button>

      <div id="settings-modal" class="overlay settings-modal hidden">
        <div class="settings-card">
          <h2 class="settings-title">Settings</h2>

          <div id="settings-pane-audio" class="settings-pane">
            <div class="setting-row">
              <div class="setting-label">Music</div>
              <button id="toggle-music" class="toggle-btn" data-enabled="true" aria-label="Toggle Music"></button>
            </div>
            <div class="setting-row">
              <div class="setting-label">Sound Effects</div>
              <button id="toggle-fx" class="toggle-btn" data-enabled="true" aria-label="Toggle Sound Effects"></button>
            </div>
            <div class="setting-row">
              <div class="setting-label">Haptics</div>
              <button id="toggle-haptics" class="toggle-btn" data-enabled="true" aria-label="Toggle Haptics"></button>
            </div>
          </div>

          <div class="modal-actions">
            <button id="settings-close" class="button">Close</button>
          </div>
        </div>
      </div>

      <div id="game-over-screen" class="overlay center-overlay hidden">
        <div class="panel">
          <h2 class="title" style="font-size: clamp(1.9rem, 7vw, 2.8rem)">Finish</h2>
          <p id="result-label" class="subtitle">Time: 0.00s</p>
          <button id="play-again-btn" class="button">Run Again</button>
        </div>
      </div>

      <div id="mobile-controls" class="hidden">
        <div id="swipe-puck" aria-hidden="true">
          <div id="swipe-handle"></div>
        </div>
        <div id="swipe-power-label">Swipe Power 0%</div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
