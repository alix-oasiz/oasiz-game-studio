<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
        html,
        body {
            position: absolute;
            left: 0;
            top: 0;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            display: block;
        }

        #solitaire-html-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 20;
        }

        #solitaire-html-button-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 19;
        }

        #solitaire-html-layer.hidden,
        #solitaire-html-button-layer.hidden,
        .solitaire-html-button.hidden,
        .solitaire-html-text.hidden {
            display: none;
        }

        .solitaire-html-text {
            position: absolute;
            transform: translate(-50%, -50%);
            font-family: "Open Sans", Arial, sans-serif;
            font-weight: 700;
            line-height: 1.14;
            white-space: pre-wrap;
            text-align: center;
            text-rendering: geometricPrecision;
            -webkit-font-smoothing: antialiased;
            font-smooth: always;
            -webkit-text-stroke: var(--solitaire-html-stroke-width, 1.5px) var(--solitaire-html-stroke-color, #ffffff);
            overflow-wrap: break-word;
            word-break: normal;
            hyphens: none;
        }

        .solitaire-html-text--menu {
            animation: solitaire-title-float 2500ms ease-in-out infinite;
            white-space: pre;
        }

        .solitaire-html-text--modal {
            letter-spacing: 2px;
        }

        .solitaire-html-letter {
            display: inline;
        }

        .solitaire-html-button {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 0 16px;
            border: 2px solid #FFFFFF;
            border-bottom: 6px solid var(--btn-rim, #111111);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.18) 28%, rgba(255,255,255,0) 28%),
                var(--btn-main, #B3131B);
            color: #111111;
            font-family: "Open Sans", Arial, sans-serif;
            font-weight: 800;
            line-height: 1;
            white-space: nowrap;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            -webkit-text-stroke: 0.85px #FFFFFF;
            pointer-events: auto;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .solitaire-html-button.is-pressed {
            transform: translate(-50%, calc(-50% + var(--btn-press-offset, 4px)));
            border-bottom-width: 2px;
        }

        .solitaire-html-button.is-disabled {
            opacity: 0.7;
            cursor: default;
        }

        @keyframes solitaire-title-float {
            0%, 100% {
                transform: translate(-50%, -50%);
            }
            50% {
                transform: translate(-50%, calc(-50% - 12px));
            }
        }
    </style>
    <title>Solitaire</title>
</head>

<body>
    <div id="game-container"></div>
    <div id="solitaire-html-button-layer" class="hidden" aria-hidden="true"></div>
    <div id="solitaire-html-layer" class="hidden" aria-hidden="true">
        <div id="solitaire-main-title" class="solitaire-html-text hidden"></div>
        <div id="solitaire-modal-title" class="solitaire-html-text hidden"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
